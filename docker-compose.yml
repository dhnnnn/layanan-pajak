services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: layanan_pajak_app
    restart: unless-stopped
    volumes:
      - .:/var/www
      - /var/www/vendor
      - /var/www/node_modules
    environment:
      - APP_ENV=local
    networks:
      - layanan_pajak
    depends_on:
      db:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    container_name: layanan_pajak_nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - layanan_pajak
    depends_on:
      - app

  db:
    image: mysql:8.0
    container_name: layanan_pajak_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: layanan_pajak
      MYSQL_ROOT_PASSWORD: secret
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - layanan_pajak
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  queue:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: layanan_pajak_queue
    restart: unless-stopped
    command: php artisan queue:work --sleep=3 --tries=3 --max-time=3600
    volumes:
      - .:/var/www
      - /var/www/vendor
    networks:
      - layanan_pajak
    depends_on:
      db:
        condition: service_healthy

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: layanan_pajak_scheduler
    restart: unless-stopped
    command: sh -c "while true; do php artisan schedule:run --verbose --no-interaction; sleep 60; done"
    volumes:
      - .:/var/www
      - /var/www/vendor
    networks:
      - layanan_pajak
    depends_on:
      db:
        condition: service_healthy

networks:
  layanan_pajak:
    driver: bridge

volumes:
  db_data:
    driver: local
